<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三星堆交互系统</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/Pass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <style>
        :root {
            --bg: #000406;
            --panel: rgba(10, 18, 24, 0.78);
            --panel-border: rgba(255, 255, 255, 0.1);
            --text: rgba(255, 255, 255, 0.92);
            --muted: rgba(255, 255, 255, 0.56);
            --cyan: #00ffcc;
            --gold: #d8b15d;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            cursor: crosshair;
        }

        canvas {
            display: block;
        }

        #canvas-container {
            position: fixed;
            inset: 0;
        }

        .scanline {
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.22;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 255, 204, 0.02) 50%);
            background-size: 100% 4px;
        }

        .panel {
            position: fixed;
            top: 24px;
            left: 24px;
            width: min(360px, calc(100vw - 48px));
            padding: 22px;
            border-radius: 22px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
            border: 1px solid var(--panel-border);
            backdrop-filter: blur(22px);
            z-index: 10;
        }

        .top-line {
            width: 300px;
            height: 3px;
            margin-bottom: 10px;
            background: var(--cyan);
            border-radius: 999px;
            box-shadow: 0 0 12px rgba(0, 255, 204, 0.35);
        }

        .title {
            margin: 0;
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            text-align: center;
        }

        .subtitle {
            margin: 10px 0 18px;
            font-size: 13px;
            letter-spacing: 0.12em;
            color: var(--muted);
        }

        .desc {
            margin: 0 0 18px;
            font-size: 13px;
            line-height: 1.7;
            color: var(--muted);
        }

        .controls {
            display: grid;
            gap: 10px;
        }

        .button,
        .upload-label {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 46px;
            padding: 0 14px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text);
            font-size: 14px;
            cursor: pointer;
            transition: 0.25s ease;
        }

        .button:hover,
        .upload-label:hover {
            border-color: rgba(0, 255, 204, 0.42);
            background: rgba(0, 255, 204, 0.08);
        }

        .upload-label input {
            display: none;
        }

        .meta {
            margin-top: 16px;
            display: grid;
            gap: 10px;
        }

        .meta-item {
            padding: 12px 14px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .meta-label {
            display: block;
            margin-bottom: 6px;
            font-size: 11px;
            letter-spacing: 0.16em;
            color: var(--muted);
            text-transform: uppercase;
        }

        .meta-value {
            font-size: 14px;
            word-break: break-all;
        }

        .asset-row {
            position: relative;
        }

        .asset-header {
            display: flex;
            align-items: stretch;
            gap: 10px;
        }

        .asset-content {
            flex: 1;
            min-width: 0;
        }

        .model-toggle {
            width: 34px;
            min-width: 34px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: linear-gradient(180deg, rgba(12, 18, 24, 0.95), rgba(4, 8, 12, 0.98));
            color: rgba(255, 255, 255, 0.88);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.25s ease, border-color 0.25s ease;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.28);
        }

        .model-toggle:hover {
            background: linear-gradient(180deg, rgba(25, 33, 40, 0.98), rgba(8, 12, 16, 0.99));
            border-color: rgba(0, 255, 204, 0.35);
        }

        .model-toggle-icon {
            font-size: 18px;
            line-height: 1;
            transition: transform 0.25s ease;
        }

        .asset-row.drawer-open .model-toggle-icon {
            transform: rotate(180deg);
        }

        .model-drawer {
            position: fixed;
            top: 24px;
            left: calc(24px + min(360px, calc(100vw - 48px)) + 14px);
            width: min(280px, calc(100vw - min(360px, calc(100vw - 48px)) - 62px));
            max-height: min(62vh, calc(100vh - 48px));
            padding: 16px;
            border-radius: 20px;
            background: linear-gradient(135deg, rgba(6, 10, 14, 0.9), rgba(10, 18, 24, 0.78));
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(18px);
            box-shadow: 0 18px 48px rgba(0, 0, 0, 0.34);
            z-index: 11;
            opacity: 0;
            transform: translateX(-14px);
            pointer-events: none;
            transition: opacity 0.28s ease, transform 0.28s ease;
        }

        .model-drawer.open {
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto;
        }

        .model-drawer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 12px;
        }

        .model-drawer-title {
            margin: 0;
            font-size: 13px;
            letter-spacing: 0.16em;
            color: var(--muted);
            text-transform: uppercase;
        }

        .model-drawer-close {
            width: 32px;
            height: 32px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text);
            cursor: pointer;
            transition: 0.25s ease;
        }

        .model-drawer-close:hover {
            border-color: rgba(0, 255, 204, 0.42);
            background: rgba(0, 255, 204, 0.08);
        }

        .model-list {
            display: grid;
            gap: 8px;
            max-height: calc(min(62vh, calc(100vh - 48px)) - 78px);
            overflow-y: auto;
            padding-right: 6px;
            scrollbar-width: thin;
            scrollbar-color: #000 rgba(255, 255, 255, 0.08);
        }

        .model-list::-webkit-scrollbar {
            width: 8px;
        }

        .model-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 999px;
        }

        .model-list::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #111, #000);
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.14);
        }

        .model-list::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #222, #060606);
        }

        .model-item {
            width: 100%;
            padding: 12px 12px 12px 14px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text);
            text-align: left;
            cursor: pointer;
            transition: 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .model-item:hover,
        .model-item.active {
            border-color: rgba(0, 255, 204, 0.42);
            background: rgba(0, 255, 204, 0.08);
        }

        .model-item-name {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .model-delete {
            width: 26px;
            height: 26px;
            min-width: 26px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.26);
            color: rgba(255, 255, 255, 0.72);
            cursor: pointer;
            transition: 0.25s ease;
        }

        .model-delete:hover {
            border-color: rgba(255, 92, 92, 0.62);
            background: rgba(255, 92, 92, 0.16);
            color: #fff;
        }

        .artifact-description {
            position: fixed;
            top: 50%;
            right: 24px;
            width: min(360px, calc(100vw - 48px));
            max-height: min(58vh, 560px);
            padding: 22px;
            border-radius: 24px;
            background: linear-gradient(135deg, rgba(6, 10, 14, 0.88), rgba(10, 18, 24, 0.78));
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(22px);
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.4);
            z-index: 10;
            opacity: 0;
            transform: translate(18px, -50%);
            pointer-events: none;
            transition: opacity 0.28s ease, transform 0.28s ease;
        }

        .artifact-description.visible {
            opacity: 1;
            transform: translate(0, -50%);
            pointer-events: auto;
        }

        .description-kicker {
            margin-bottom: 10px;
            font-size: 10px;
            letter-spacing: 0.22em;
            color: var(--gold);
            text-transform: uppercase;
        }

        .description-title {
            margin: 0 0 14px;
            padding-bottom: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 20px;
            font-weight: 300;
            letter-spacing: 0.08em;
            color: var(--text);
        }

        .description-body {
            max-height: calc(min(58vh, 560px) - 112px);
            overflow-y: auto;
            padding-right: 6px;
            font-size: 13px;
            line-height: 1.85;
            color: var(--muted);
            scrollbar-width: thin;
            scrollbar-color: #000 rgba(255, 255, 255, 0.08);
        }

        .description-body::-webkit-scrollbar {
            width: 8px;
        }

        .description-body::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 999px;
        }

        .description-body::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #111, #000);
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.14);
        }

        .tips {
            position: fixed;
            right: 24px;
            bottom: 24px;
            max-width: min(360px, calc(100vw - 48px));
            padding: 14px 16px;
            border-radius: 16px;
            background: var(--panel);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(18px);
            z-index: 10;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.7;
        }

        .drop-mask {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 20;
            background: rgba(0, 4, 6, 0.42);
            backdrop-filter: blur(5px);
        }

        .drop-mask.active {
            display: flex;
        }

        .drop-box {
            padding: 28px 34px;
            border-radius: 20px;
            border: 1px dashed rgba(255, 255, 255, 0.26);
            background: rgba(10, 18, 24, 0.84);
            color: var(--text);
            font-size: 16px;
            letter-spacing: 0.08em;
        }

        .gesture-panel {
            position: fixed;
            left: calc(24px + min(360px, calc(100vw - 48px)) + 14px);
            bottom: 24px;
            width: 220px;
            border-radius: 20px;
            overflow: hidden;
            background: rgba(10, 18, 24, 0.78);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(18px);
            z-index: 12;
            box-shadow: 0 18px 48px rgba(0, 0, 0, 0.34);
        }

        .gesture-camera {
            position: relative;
            height: 150px;
            background: rgba(0, 0, 0, 0.28);
        }

        .gesture-camera video,
        .gesture-camera canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .gesture-camera video {
            opacity: 0.28;
            filter: grayscale(1);
            transform: scaleX(-1);
        }

        .gesture-camera canvas {
            transform: scaleX(-1);
        }

        .gesture-loading {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.38);
            color: var(--muted);
            font-size: 12px;
            letter-spacing: 0.08em;
        }

        .gesture-loading.hidden {
            display: none;
        }

        .gesture-status {
            position: relative;
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 52px;
            padding: 12px 14px 14px;
        }

        .gesture-dot {
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: #b42323;
        }

        .gesture-dot.active {
            background: var(--cyan);
            box-shadow: 0 0 12px rgba(0, 255, 204, 0.8);
        }

        .gesture-meta {
            min-width: 0;
        }

        .gesture-label {
            margin-bottom: 3px;
            font-size: 9px;
            letter-spacing: 0.18em;
            color: var(--muted);
            text-transform: uppercase;
        }

        .gesture-name {
            font-size: 12px;
            color: var(--cyan);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .gesture-progress {
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0%;
            height: 3px;
            background: var(--cyan);
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.8);
            transition: width 0.1s linear;
        }

        @media (max-width: 1024px) {
            .model-drawer {
                left: auto;
                right: 24px;
                width: min(280px, calc(100vw - 48px));
            }

            .gesture-panel {
                left: auto;
                right: 24px;
            }
        }

        @media (max-width: 768px) {
            .panel {
                top: 16px;
                left: 16px;
                width: calc(100vw - 32px);
                padding: 18px;
            }

            .title {
                font-size: 22px;
                letter-spacing: 0.22em;
            }

            .model-drawer {
                top: auto;
                left: 16px;
                right: 16px;
                bottom: 92px;
                width: auto;
                max-height: 50vh;
                transform: translateY(18px);
            }

            .model-drawer.open {
                transform: translateY(0);
            }

            .model-list {
                max-height: calc(50vh - 82px);
            }

            .gesture-panel {
                left: 16px;
                bottom: 96px;
                width: 160px;
            }

            .gesture-camera {
                height: 108px;
            }

            .artifact-description {
                top: auto;
                left: 16px;
                right: 16px;
                bottom: 180px;
                width: auto;
                max-height: 36vh;
                transform: translateY(18px);
            }

            .artifact-description.visible {
                transform: translateY(0);
            }

            .description-body {
                max-height: calc(36vh - 112px);
            }

            .tips {
                left: 16px;
                right: 16px;
                bottom: 16px;
                max-width: none;
            }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="scanline"></div>

    <section class="panel">
        <div class="top-line"></div>
        <h1 class="title">Sanxingdui</h1>
        <p id="subtitle" class="subtitle">三星堆交互系统</p>
        <p id="desc" class="desc">核心功能：1.星云粒子与文物粒子形态动态切换。<br>2.支持 OBJ 文物导入、预加载、列表切换与删除。<br>3.支持鼠标、滚轮和手势识别进行旋转、缩放与切换。<br>4.支持绿色、蓝色、橙色粒子主题与中英文界面。<br>5.支持 API 生成文物描述并随语言切换翻译。</p>

        <div class="controls">
            <label class="upload-label">
                <span id="upload-text">导入 OBJ 文件</span>
                <input id="file-input" type="file" multiple accept=".obj">
            </label>
            <button id="nebula-btn" class="button" type="button">切换到星云模式</button>
            <button id="artifact-mode-btn" class="button" type="button">文物查看模式：关闭</button>
            <button id="color-theme-btn" class="button" type="button">粒子颜色：绿色</button>
            <button id="lang-btn" class="button" type="button">Language: English</button>
        </div>

        <div class="meta">
            <div class="meta-item">
                <span id="status-label" class="meta-label">当前状态</span>
                <span id="status-text" class="meta-value">星云待机模式</span>
            </div>
            <div class="meta-item asset-row" id="asset-row">
                <div class="asset-header">
                    <div class="asset-content">
                        <span id="asset-label" class="meta-label">当前对象</span>
                        <span id="asset-name" class="meta-value">星云待机模式</span>
                    </div>
                    <button id="model-toggle" class="model-toggle" type="button" aria-expanded="false" aria-label="打开文物展示列表">
                        <span class="model-toggle-icon">▶</span>
                    </button>
                </div>
            </div>
        </div>
    </section>

    <aside id="model-drawer" class="model-drawer" aria-hidden="true">
        <div class="model-drawer-header">
            <h2 id="model-list-label" class="model-drawer-title">文物展示列表</h2>
            <button id="model-drawer-close" class="model-drawer-close" type="button" aria-label="关闭文物展示列表">×</button>
        </div>
        <div id="model-list" class="model-list"></div>
    </aside>

    <aside id="artifact-description" class="artifact-description" aria-live="polite">
        <div id="description-kicker" class="description-kicker">文物描述</div>
        <h2 id="description-title" class="description-title">星云待机模式</h2>
        <div id="description-body" class="description-body">请选择文物以查看描述。</div>
    </aside>

    <div id="tips" class="tips">操作提示：按住鼠标左键旋转，滚轮缩放。支持点击上传，也支持将 .obj 文件直接拖入页面。</div>

    <div id="drop-mask" class="drop-mask">
        <div id="drop-box" class="drop-box">松开鼠标即可导入 OBJ 文件</div>
    </div>

    <section class="gesture-panel" aria-label="手势识别控制面板">
        <div class="gesture-camera">
            <video id="input-video" playsinline muted></video>
            <canvas id="output-canvas"></canvas>
            <div id="gesture-loading" class="gesture-loading">启动摄像头...</div>
        </div>
        <div class="gesture-status">
            <span id="vision-dot" class="gesture-dot"></span>
            <div class="gesture-meta">
                <div id="gesture-label" class="gesture-label">手势识别</div>
                <div id="gesture-name" class="gesture-name">等待输入...</div>
            </div>
            <div id="gesture-progress" class="gesture-progress"></div>
        </div>
    </section>

    <script>
        const config = {
            count: 200000,
            colors: { dark: 0x000406 },
            apiKey: "AIzaSyDkqdEiyWXJsCHAaK0dwjAcX6DgIUBuCJY"
        };

        let scene;
        let camera;
        let renderer;
        let composer;
        let points;

        let currentRotationY = 0;
        let isDragging = false;
        let lastMouseX = 0;
        let lastMouseY = 0;
        let lerpScale = 1.0;
        let targetScale = 1.0;
        let isArtifactViewMode = false;
        const defaultCameraPosition = new THREE.Vector3(0, 0, 180);
        const artifactZoomRange = { min: 40, max: 500 };
        let currentLang = "zh";
        let currentStatusKey = "nebulaMode";
        let currentStatusVars = null;
        let okGestureStartTime = null;
        let basePinchDist = null;
        let baseScale = 1.0;
        const gestureSwitchDelay = 1500;
        const colorThemes = [
            {
                key: "green",
                labelZh: "绿色",
                labelEn: "Green",
                artifactBase: [0.05, 0.95, 0.8],
                artifactAccent: [1.0, 0.85, 0.2],
                nebulaBase: [0.0, 0.4, 0.3],
                nebulaAccent: [0.6, 0.5, 0.1],
                halo: [0.05, 0.2, 0.3]
            },
            {
                key: "blue",
                labelZh: "蓝色",
                labelEn: "Blue",
                artifactBase: [0.08, 0.46, 1.0],
                artifactAccent: [0.32, 0.9, 1.0],
                nebulaBase: [0.02, 0.18, 0.55],
                nebulaAccent: [0.2, 0.75, 1.0],
                halo: [0.02, 0.12, 0.38]
            },
            {
                key: "orange",
                labelZh: "橙色",
                labelEn: "Orange",
                artifactBase: [1.0, 0.48, 0.08],
                artifactAccent: [1.0, 0.82, 0.22],
                nebulaBase: [0.52, 0.18, 0.02],
                nebulaAccent: [1.0, 0.58, 0.08],
                halo: [0.34, 0.12, 0.02]
            }

        function initApp() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(config.colors.dark);

            camera = new THREE.PerspectiveCamera(25, window.innerWidth / window.innerHeight, 0.1, 2000);
            updateDefaultCameraAnchor();
            camera.position.copy(defaultCameraPosition);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById("canvas-container").appendChild(renderer.domElement);

            composer = new THREE.EffectComposer(renderer);
            composer.addPass(new THREE.RenderPass(scene, camera));
            composer.addPass(new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.5, 0.8));

            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(config.count * 3);
            const colors = new Float32Array(config.count * 3);
            const sizes = new Float32Array(config.count);

            for (let i = 0; i < config.count; i++) {
                const i3 = i * 3;
                positions[i3] = (Math.random() - 0.5) * 800;
                positions[i3 + 1] = (Math.random() - 0.5) * 800;
                positions[i3 + 2] = (Math.random() - 0.5) * 800;

                targetPositions[i3] = positions[i3];
                targetPositions[i3 + 1] = positions[i3 + 1];
                targetPositions[i3 + 2] = positions[i3 + 2];

                colors[i3] = 0.1;
                colors[i3 + 1] = 0.4;
                colors[i3 + 2] = 0.6;

                targetColors[i3] = colors[i3];
                targetColors[i3 + 1] = colors[i3 + 1];
                targetColors[i3 + 2] = colors[i3 + 2];

                sizes[i] = Math.random() < 0.05 ? 0.35 : 0.08;
                targetSizes[i] = sizes[i];
            }

            geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute("size", new THREE.BufferAttribute(sizes, 1));

            points = new THREE.Points(
                geometry,
                new THREE.ShaderMaterial({
                    uniforms: {
                        uRotation: { value: 0 },
                        uScale: { value: 1.0 }
                    },
                    vertexShader: `
                        attribute float size;
                        attribute vec3 color;
                        varying vec3 vColor;
                        uniform float uRotation;
                        uniform float uScale;

                        void main() {
                            vColor = color;
                            vec3 pos = position * uScale;
                            float s = sin(uRotation);
                            float c = cos(uRotation);
                            mat2 rot = mat2(c, -s, s, c);
                            pos.xz = rot * pos.xz;
                            vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                            gl_PointSize = size * (2000.0 / -mvPosition.z);
                            gl_Position = projectionMatrix * mvPosition;
                        }
                    `,
                    fragmentShader: `
                        varying vec3 vColor;

                        void main() {
                            float d = distance(gl_PointCoord, vec2(0.5));
                            if (d > 0.5) discard;
                            gl_FragColor = vec4(vColor, (1.0 - d * 2.0) * 0.8);
                        }
                    `,
                    transparent: true,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false
                })
            );

            scene.add(points);
            setNebulaMode();
            animate();
        }

        function bindEvents() {
            window.addEventListener("resize", onResize);

            window.addEventListener("mousedown", (event) => {
                if (event.button === 0) {
                    isDragging = true;
                    lastMouseX = event.clientX;
                    lastMouseY = event.clientY;
                }
            });

            window.addEventListener("mousemove", (event) => {
                if (isDragging) {
                    if (isArtifactViewMode) {
                        panCameraByScreenDelta(event.clientX - lastMouseX, event.clientY - lastMouseY);
                    } else {
                        currentRotationY += (event.clientX - lastMouseX) * 0.005;
                    }
                    lastMouseX = event.clientX;
                    lastMouseY = event.clientY;
                }
            });

            window.addEventListener("mouseup", () => {
                isDragging = false;
            });

            window.addEventListener("wheel", (event) => {
                if (isArtifactViewMode) {
                    event.preventDefault();
                    zoomCameraTowardCursor(event);
                    return;
                }

                targetScale -= event.deltaY * 0.001;
                targetScale = Math.max(0.3, Math.min(3.0, targetScale));
            }, { passive: false });

            fileInput.addEventListener("change", (event) => {
                handleFileUpload(event.target.files);
                event.target.value = "";
            });

            nebulaBtn.addEventListener("click", () => {
                setNebulaMode();
                renderModelList();
            });

            artifactModeBtn.addEventListener("click", () => {
                isArtifactViewMode = !isArtifactViewMode;
                if (!isArtifactViewMode) {
                    resetCameraToDefault();
                }
                updateArtifactModeButton();
            });

            langBtn.addEventListener("click", () => {
                currentLang = currentLang === "zh" ? "en" : "zh";
                applyLanguage();
            });

            colorThemeBtn.addEventListener("click", () => {
                colorThemeIndex = (colorThemeIndex + 1) % colorThemes.length;
                updateColorThemeButton();
                if (activeModelIndex === -1) {
                    setNebulaMode();
                } else {
                    reconstructModel(activeModelIndex);
                }
            });

            modelToggle.addEventListener("click", toggleModelDrawer);
            modelDrawerClose.addEventListener("click", closeModelDrawer);

            window.addEventListener("keydown", (event) => {
                if (event.key === "Escape") {
                    closeModelDrawer();
                }
            });

            window.addEventListener("dragover", (event) => {
                event.preventDefault();
                dropMask.classList.add("active");
            });

            window.addEventListener("dragleave", (event) => {
                if (event.clientX <= 0 || event.clientY <= 0 || event.clientX >= window.innerWidth || event.clientY >= window.innerHeight) {
                    dropMask.classList.remove("active");
                }
            });

            window.addEventListener("drop", (event) => {
                event.preventDefault();
                dropMask.classList.remove("active");
                const files = Array.from(event.dataTransfer.files).filter((file) => file.name.toLowerCase().endsWith(".obj"));
                if (files.length > 0) {
                    handleFileUpload(files);
                } else {
                    setStatusByKey("onlyObj");
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);

            if (!isDragging && !isArtifactViewMode) {
                currentRotationY += 0.0012;
            }

            lerpScale += (targetScale - lerpScale) * 0.1;
            points.material.uniforms.uRotation.value = currentRotationY;
            points.material.uniforms.uScale.value = lerpScale;

            const positionArray = points.geometry.attributes.position.array;
            const colorArray = points.geometry.attributes.color.array;
            const sizeArray = points.geometry.attributes.size.array;

            for (let i = 0; i < config.count; i++) {
                const i3 = i * 3;

                positionArray[i3] += (targetPositions[i3] - positionArray[i3]) * 0.06;
                positionArray[i3 + 1] += (targetPositions[i3 + 1] - positionArray[i3 + 1]) * 0.06;
                positionArray[i3 + 2] += (targetPositions[i3 + 2] - positionArray[i3 + 2]) * 0.06;

                colorArray[i3] += (targetColors[i3] - colorArray[i3]) * 0.04;
                colorArray[i3 + 1] += (targetColors[i3 + 1] - colorArray[i3 + 1]) * 0.04;
                colorArray[i3 + 2] += (targetColors[i3 + 2] - colorArray[i3 + 2]) * 0.04;

                sizeArray[i] += (targetSizes[i] - sizeArray[i]) * 0.06;
            }

            points.geometry.attributes.position.needsUpdate = true;
            points.geometry.attributes.color.needsUpdate = true;
            points.geometry.attributes.size.needsUpdate = true;

            composer.render();
        }

        function setNebulaMode() {
            activeModelIndex = -1;
            targetScale = 1.0;
            assetName.textContent = t("nebulaMode");
            setStatusByKey("nebulaMode");
            clearArtifactDescription();

            for (let i = 0; i < config.count; i++) {
                const i3 = i * 3;
                const r = 50 + Math.random() * 100;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(Math.random() * 2 - 1);
                const theme = getCurrentColorTheme();
                const isAccent = Math.random() > 0.85;
                const color = isAccent ? theme.nebulaAccent : theme.nebulaBase;

                targetPositions[i3] = r * Math.sin(phi) * Math.cos(theta);
                targetPositions[i3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                targetPositions[i3 + 2] = r * Math.cos(phi);

                targetColors[i3] = color[0];
                targetColors[i3 + 1] = color[1];
                targetColors[i3 + 2] = color[2];
                targetSizes[i] = Math.random() < 0.05 ? 0.35 : 0.08;
            }
        }

        function handleFileUpload(fileList) {
            const loader = new THREE.OBJLoader();
            const files = Array.from(fileList);

            if (files.length === 0) {
                return;
            }

            setStatusByKey("readingObj");

            let firstNewIndex = null;

            files.forEach((file) => {
                if (!file.name.toLowerCase().endsWith(".obj")) {
                    return;
                }

                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const group = loader.parse(event.target.result);
                        const insertedIndex = addModel(group, file.name.replace(/\.obj$/i, ""));
                        if (firstNewIndex === null) {
                            firstNewIndex = insertedIndex;
                        }

                        renderModelList();
                        if (firstNewIndex === insertedIndex) {
                            reconstructModel(firstNewIndex);
                        }
                    } catch (error) {
                        console.error(error);
                        setStatusByKey("parseFailed");
                    }
                };

                reader.onerror = () => {
                    setStatusByKey("readFailed");
                };

                reader.readAsText(file);
            });
        }

        async function preloadPresetModels() {
            if (presetModels.length === 0) {
                return;
            }

            const loader = new THREE.OBJLoader();
            let firstSuccessIndex = null;
            const failedPaths = [];

            setStatusByKey("preloading");

            for (const modelPath of presetModels) {
                try {
                    const group = await loadObjFromPath(loader, modelPath);
                    const modelName = extractModelName(modelPath);
                    const insertedIndex = addModel(group, modelName);
                    if (firstSuccessIndex === null) {
                        firstSuccessIndex = insertedIndex;
                    }
                } catch (error) {
                    console.error(error);
                    failedPaths.push(modelPath);
                }
            }

            renderModelList();

            if (firstSuccessIndex !== null) {
                reconstructModel(firstSuccessIndex);
            } else {
                setNebulaMode();
                renderModelList();
            }

            if (failedPaths.length > 0) {
                setStatusByKey("preloadPartialFailed", { paths: failedPaths });
            }
        }

        function loadObjFromPath(loader, modelPath) {
            return new Promise((resolve, reject) => {
                loader.load(
                    modelPath,
                    (group) => resolve(group),
                    undefined,
                    (error) => reject(error || new Error(t("objLoadFailed")))
                );
            });
        }

        function extractModelName(path) {
            const fileName = path.split("/").pop() || path;
            return fileName.replace(/\.obj$/i, "");
        }

        function addModel(group, name) {
            const displayNames = createModelDisplayNames(name, models.length + 1);
            const modelData = {
                id: Date.now() + Math.random(),
                name,
                nameZh: displayNames.zh,
                nameEn: displayNames.en,
                descriptions: {},
                group
            };
            models.push(modelData);
            return models.length - 1;
        }

        function reconstructModel(index) {
            const modelData = models[index];
            if (!modelData) {
                return;
            }

            modelData.group.updateMatrixWorld(true);
            activeModelIndex = index;
            assetName.textContent = getModelDisplayName(modelData);
            setStatusByKey("switchedModel");
            updateArtifactDescription(modelData);

            const samplerPoints = [];

            modelData.group.traverse((child) => {
                if (!child.isMesh || !child.geometry || !child.geometry.attributes || !child.geometry.attributes.position) {
                    return;
                }

                const positionAttr = child.geometry.attributes.position;
                for (let i = 0; i < positionAttr.count; i++) {
                    samplerPoints.push(
                        new THREE.Vector3()
                            .fromBufferAttribute(positionAttr, i)
                            .applyMatrix4(child.matrixWorld)
                    );
                }
            });

            if (samplerPoints.length === 0) {
                setStatusByKey("noVertex");
                return;
            }

            const box = new THREE.Box3().setFromObject(modelData.group);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            const maxAxis = Math.max(size.x, size.y, size.z) || 1;
            const scale = 55 / maxAxis;
            const bodyCount = Math.floor(config.count * 0.9);
            const theme = getCurrentColorTheme();

            targetScale = 1.0;

            for (let i = 0; i < config.count; i++) {
                const i3 = i * 3;

                if (i < bodyCount) {
                    const point = samplerPoints[Math.floor(Math.random() * samplerPoints.length)];
                    const jitter = 0.02;
                    const isAccent = Math.random() > 0.75;
                    const color = isAccent ? theme.artifactAccent : theme.artifactBase;
                    const randomSize = Math.random();

                    targetPositions[i3] = (point.x - center.x) * scale + (Math.random() - 0.5) * jitter;
                    targetPositions[i3 + 1] = (point.y - center.y) * scale + (Math.random() - 0.5) * jitter;
                    targetPositions[i3 + 2] = (point.z - center.z) * scale + (Math.random() - 0.5) * jitter;

                    targetColors[i3] = color[0];
                    targetColors[i3 + 1] = color[1];
                    targetColors[i3 + 2] = color[2];

                    if (randomSize > 0.98) {
                        targetSizes[i] = 0.3;
                    } else if (randomSize > 0.9) {
                        targetSizes[i] = 0.15;
                    } else {
                        targetSizes[i] = 0.045;
                    }
                } else {
                    const r = 100 + Math.random() * 150;
                    const theta = Math.random() * Math.PI * 2;

                    targetPositions[i3] = r * Math.cos(theta);
                    targetPositions[i3 + 1] = (Math.random() - 0.5) * 300;
                    targetPositions[i3 + 2] = r * Math.sin(theta);

                    targetColors[i3] = theme.halo[0];
                    targetColors[i3 + 1] = theme.halo[1];
                    targetColors[i3 + 2] = theme.halo[2];
                    targetSizes[i] = 0.06;
                }
            }

            renderModelList();
        }

        function renderModelList() {
            modelList.innerHTML = "";

            models.forEach((model, index) => {
                const item = document.createElement("button");
                item.type = "button";
                item.className = "model-item" + (index === activeModelIndex ? " active" : "");
                item.addEventListener("click", () => reconstructModel(index));

                const name = document.createElement("span");
                name.className = "model-item-name";
                name.textContent = getModelDisplayName(model);
                name.title = getModelDisplayName(model);

                const deleteButton = document.createElement("button");
                deleteButton.type = "button";
                deleteButton.className = "model-delete";
                deleteButton.textContent = "×";
                deleteButton.setAttribute("aria-label", (currentLang === "zh" ? "删除" : "Delete") + getModelDisplayName(model));
                deleteButton.addEventListener("click", (event) => {
                    event.stopPropagation();
                    deleteModel(index);
                });

                item.appendChild(name);
                item.appendChild(deleteButton);
                modelList.appendChild(item);
            });
        }

        function deleteModel(index) {
            if (!models[index]) {
                return;
            }

            models.splice(index, 1);

            if (models.length === 0) {
                setNebulaMode();
                renderModelList();
                return;
            }

            if (index === activeModelIndex) {
                const nextIndex = Math.min(index, models.length - 1);
                reconstructModel(nextIndex);
                return;
            }

            if (index < activeModelIndex) {
                activeModelIndex -= 1;
            }

            renderModelList();
        }

        function toggleModelDrawer() {
            setModelDrawerOpen(!modelDrawer.classList.contains("open"));
        }

        function closeModelDrawer() {
            setModelDrawerOpen(false);
        }

        function setModelDrawerOpen(isOpen) {
            modelDrawer.classList.toggle("open", isOpen);
            assetRow.classList.toggle("drawer-open", isOpen);
            modelDrawer.setAttribute("aria-hidden", String(!isOpen));
            modelToggle.setAttribute("aria-expanded", String(isOpen));
            modelToggle.setAttribute("aria-label", isOpen ? (currentLang === "zh" ? "关闭文物展示列表" : "Close artifact list") : (currentLang === "zh" ? "打开文物展示列表" : "Open artifact list"));
            modelToggle.querySelector(".model-toggle-icon").textContent = isOpen ? "◀" : "▶";
        }

        function initVision() {
            if (typeof Hands === "undefined" || typeof Camera === "undefined") {
                gestureName.textContent = t("gestureCameraError");
                gestureLoading.classList.add("hidden");
                return;
            }

            const canvasCtx = outputCanvas.getContext("2d");
            const hands = new Hands({ locateFile: (file) => "https://cdn.jsdelivr.net/npm/@mediapipe/hands/" + file });

            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.7
            });

            hands.onResults((results) => {
                gestureLoading.classList.add("hidden");
                canvasCtx.save();
                canvasCtx.clearRect(0, 0, outputCanvas.width, outputCanvas.height);

                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    visionDot.classList.add("active");
                    const landmarks = results.multiHandLandmarks[0];

                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, { color: "#00ffff", lineWidth: 2 });
                    drawLandmarks(canvasCtx, landmarks, { color: "#ffd700", lineWidth: 1, radius: 2 });
                    handleGestureControl(landmarks);
                } else {
                    visionDot.classList.remove("active");
                    gestureName.textContent = t("gestureWaiting");
                    gestureProgress.style.width = "0%";
                    okGestureStartTime = null;
                    basePinchDist = null;
                }

                canvasCtx.restore();
            });

            const cameraPipe = new Camera(inputVideo, {
                onFrame: async () => {
                    outputCanvas.width = inputVideo.videoWidth || 320;
                    outputCanvas.height = inputVideo.videoHeight || 240;
                    await hands.send({ image: inputVideo });
                },
                width: 320,
                height: 240
            });

            cameraPipe.start().catch((error) => {
                console.error("Camera access error:", error);
                gestureName.textContent = t("gestureCameraError");
                gestureLoading.classList.add("hidden");
            });
        }

        function handleGestureControl(landmarks) {
            const distance = (firstIndex, secondIndex) => Math.hypot(
                landmarks[firstIndex].x - landmarks[secondIndex].x,
                landmarks[firstIndex].y - landmarks[secondIndex].y
            );
            const palmSize = distance(0, 5) || 0.1;
            const pinchDistance = distance(4, 8);
            const middleExtended = landmarks[12].y < landmarks[9].y;
            const ringExtended = landmarks[16].y < landmarks[13].y;
            const isFingersExtended = middleExtended && ringExtended;
            const isOkGesture = pinchDistance < palmSize * 0.45 && middleExtended;

            if (isFingersExtended && pinchDistance > palmSize * 0.8) {
                if (basePinchDist === null) {
                    basePinchDist = pinchDistance;
                    baseScale = targetScale;
                }
                const scaleFactor = pinchDistance / basePinchDist;
                targetScale = Math.max(0.3, Math.min(3.0, baseScale * scaleFactor));
                gestureName.textContent = t("gestureScaling");
            } else {
                basePinchDist = null;
            }

            if (isOkGesture) {
                gestureName.textContent = t("gestureSwitching");
                if (!okGestureStartTime) {
                    okGestureStartTime = Date.now();
                }
                const elapsed = Date.now() - okGestureStartTime;
                const progress = Math.min(100, (elapsed / gestureSwitchDelay) * 100);
                gestureProgress.style.width = progress + "%";

                if (elapsed >= gestureSwitchDelay) {
                    if (models.length > 0) {
                        reconstructModel((activeModelIndex + 1) % models.length);
                    } else {
                        setNebulaMode();
                    }
                    okGestureStartTime = null;
                    gestureProgress.style.width = "0%";
                }
            } else {
                okGestureStartTime = null;
                gestureProgress.style.width = "0%";
                if (basePinchDist === null) {
                    gestureName.textContent = t("gestureActive");
                }
            }

            if (!isArtifactViewMode) {
                currentRotationY += (landmarks[0].x - 0.5) * 0.08;
            } else {
                camera.position.x += (landmarks[0].x - 0.5) * 0.35;
                camera.position.y += (0.5 - landmarks[0].y) * 0.24;
            }
        }

        function hasChineseText(text) {
            return /[\u4e00-\u9fa5]/.test(text);
        }

        function createModelDisplayNames(name, modelOrder) {
            const zhName = name;
            if (!hasChineseText(name)) {
                return { zh: zhName, en: name };
            }

            const normalizedName = name.replace(/[\s_\-（）()\[\]【】]/g, "");
            const mappedName = modelNameDictionary[name] || modelNameDictionary[normalizedName];
            if (mappedName) {
                return { zh: zhName, en: mappedName };
            }

            const translatedName = translateChineseModelName(normalizedName);
            return {
                zh: zhName,
                en: translatedName || ("Sanxingdui Artifact " + modelOrder)
            };
        }

        function translateChineseModelName(name) {
            let remainingName = name;
            const translatedParts = [];

            modelNameTermDictionary.forEach(([zhTerm, enTerm]) => {
                if (remainingName.includes(zhTerm)) {
                    translatedParts.push(enTerm);
                    remainingName = remainingName.replaceAll(zhTerm, "");
                }
            });

            const uniqueParts = [...new Set(translatedParts)];
            if (uniqueParts.length === 0) {
                return "";
            }

            return uniqueParts.join(" ");
        }

        function getModelDisplayName(modelData) {
            return currentLang === "en" ? (modelData.nameEn || modelData.name) : (modelData.nameZh || modelData.name);
        }

        function clearArtifactDescription() {
            artifactDescription.classList.remove("visible");
            descriptionKicker.textContent = t("descriptionKicker");
            descriptionTitle.textContent = t("descriptionEmptyTitle");
            descriptionBody.textContent = t("descriptionEmptyBody");
            updateDefaultCameraAnchor();
            if (!isArtifactViewMode) {
                camera.position.copy(defaultCameraPosition);
            }
        }

        async function updateArtifactDescription(modelData) {
            artifactDescription.classList.add("visible");
            updateDefaultCameraAnchor();
            if (!isArtifactViewMode) {
                camera.position.copy(defaultCameraPosition);
            }
            descriptionKicker.textContent = t("descriptionKicker");
            descriptionTitle.textContent = getModelDisplayName(modelData);

            if (modelData.descriptions && modelData.descriptions[currentLang]) {
                descriptionBody.textContent = modelData.descriptions[currentLang];
                return;
            }

            descriptionBody.textContent = t("descriptionLoading");
            const description = await generateArtifactDescription(modelData, currentLang);

            if (!modelData.descriptions) {
                modelData.descriptions = {};
            }
            modelData.descriptions[currentLang] = description;

            if (models[activeModelIndex] === modelData && currentLang in modelData.descriptions) {
                descriptionTitle.textContent = getModelDisplayName(modelData);
                descriptionBody.textContent = modelData.descriptions[currentLang];
            }
        }

        async function generateArtifactDescription(modelData, lang) {
            if (!config.apiKey) {
                return t("descriptionApiKeyMissing");
            }

            const displayName = lang === "en" ? (modelData.nameEn || modelData.name) : (modelData.nameZh || modelData.name);
            const prompt = lang === "en"
                ? "Write a concise, vivid museum-style description in English for this Sanxingdui artifact: " + displayName + ". Mention its possible material, cultural meaning, and ritual atmosphere in about 120 words."
                : "请用中文为三星堆文物“" + displayName + "”写一段简洁、有博物馆展陈感的介绍，说明它可能的材质、文化含义和祭祀氛围，控制在150字以内。";

            try {
                const response = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + encodeURIComponent(config.apiKey), {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                if (!response.ok) {
                    throw new Error("Description API request failed");
                }

                const data = await response.json();
                return data?.candidates?.[0]?.content?.parts?.[0]?.text || t("descriptionFallback");
            } catch (error) {
                console.error(error);
                return t("descriptionFallback");
            }
        }

        function getCurrentColorTheme() {
            return colorThemes[colorThemeIndex] || colorThemes[0];
        }

        function getColorThemeLabel() {
            const theme = getCurrentColorTheme();
            return currentLang === "en" ? theme.labelEn : theme.labelZh;
        }

        function updateColorThemeButton() {
            colorThemeBtn.textContent = t("colorThemePrefix") + getColorThemeLabel();
        }

        function t(key, vars) {
            const table = i18n[currentLang] || i18n.zh;
            let text = table[key] || "";
            if (vars && vars.paths && text.includes("{paths}")) {
                const joiner = currentLang === "zh" ? "、" : ", ";
                text = text.replace("{paths}", vars.paths.join(joiner));
            }
            return text;
        }

        function setStatusByKey(key, vars = null) {
            currentStatusKey = key;
            currentStatusVars = vars;
            statusText.textContent = t(key, vars);
        }

        function applyLanguage() {
            subtitle.textContent = t("subtitle");
            desc.innerHTML = t("desc");
            uploadText.textContent = t("upload");
            nebulaBtn.textContent = t("nebulaBtn");
            langBtn.textContent = t("langBtn");
            updateColorThemeButton();
            statusLabel.textContent = t("statusLabel");
            assetLabel.textContent = t("assetLabel");
            modelListLabel.textContent = t("modelListLabel");
            descriptionKicker.textContent = t("descriptionKicker");
            gestureLabel.textContent = t("gestureLabel");
            gestureLoading.textContent = t("gestureLoading");
            if (!visionDot.classList.contains("active")) {
                gestureName.textContent = t("gestureWaiting");
            }
            tips.textContent = t("tips");
            dropBox.textContent = t("dropBox");
            updateArtifactModeButton();
            statusText.textContent = t(currentStatusKey, currentStatusVars);

            if (activeModelIndex === -1) {
                assetName.textContent = t("nebulaMode");
            } else {
                const activeModel = models[activeModelIndex];
                if (activeModel) {
                    assetName.textContent = getModelDisplayName(activeModel);
                    updateArtifactDescription(activeModel);
                }
            }

            if (activeModelIndex === -1) {
                clearArtifactDescription();
            }

            setModelDrawerOpen(modelDrawer.classList.contains("open"));
            renderModelList();
        }

        function updateArtifactModeButton() {
            artifactModeBtn.textContent = t("artifactModePrefix") + (isArtifactViewMode ? t("on") : t("off"));
        }

        function updateDefaultCameraAnchor() {
            const panelRect = panel.getBoundingClientRect();
            const descriptionRect = artifactDescription.classList.contains("visible")
                ? artifactDescription.getBoundingClientRect()
                : null;
            const safeLeft = Math.min(panelRect.right + 24, window.innerWidth * 0.45);
            const safeRight = descriptionRect
                ? Math.max(descriptionRect.left - 24, safeLeft + window.innerWidth * 0.24)
                : window.innerWidth - 24;
            const targetScreenX = (safeLeft + safeRight) * 0.5;
            const screenDelta = targetScreenX - window.innerWidth * 0.5;
            const ndcOffset = screenDelta / (window.innerWidth * 0.5);

            const vFov = THREE.MathUtils.degToRad(camera.fov);
            const halfViewHeight = Math.tan(vFov / 2) * defaultCameraPosition.z;
            const halfViewWidth = halfViewHeight * camera.aspect;

            // 摄像机根据左侧控制面板和右侧描述框计算安全展示区，避免文物被描述框遮挡
            defaultCameraPosition.x = -ndcOffset * halfViewWidth;
            defaultCameraPosition.y = 0;
        }

        function resetCameraToDefault() {
            updateDefaultCameraAnchor();
            camera.position.copy(defaultCameraPosition);
            camera.updateProjectionMatrix();
        }

        function getWorldUnitsPerPixel() {
            const vFov = THREE.MathUtils.degToRad(camera.fov);
            const viewHeight = 2 * Math.tan(vFov / 2) * camera.position.z;
            return viewHeight / window.innerHeight;
        }

        function panCameraByScreenDelta(deltaX, deltaY) {
            const unitsPerPixel = getWorldUnitsPerPixel();
            camera.position.x -= deltaX * unitsPerPixel;
            camera.position.y += deltaY * unitsPerPixel;
        }

        function zoomCameraTowardCursor(event) {
            const prevZ = camera.position.z;
            let nextZ = prevZ + event.deltaY * 0.08;
            nextZ = Math.max(artifactZoomRange.min, Math.min(artifactZoomRange.max, nextZ));

            if (Math.abs(nextZ - prevZ) < 1e-6) {
                return;
            }

            const cx = window.innerWidth * 0.5;
            const cy = window.innerHeight * 0.5;
            const dx = event.clientX - cx;
            const dy = event.clientY - cy;

            const vFov = THREE.MathUtils.degToRad(camera.fov);
            const oldUnitsPerPixel = (2 * Math.tan(vFov / 2) * prevZ) / window.innerHeight;
            const newUnitsPerPixel = (2 * Math.tan(vFov / 2) * nextZ) / window.innerHeight;
            const deltaUnitsPerPixel = oldUnitsPerPixel - newUnitsPerPixel;

            // 保持鼠标所在屏幕点对应的世界位置不漂移
            camera.position.x += dx * deltaUnitsPerPixel;
            camera.position.y -= dy * deltaUnitsPerPixel;
            camera.position.z = nextZ;
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            updateDefaultCameraAnchor();
            if (!isArtifactViewMode) {
                camera.position.copy(defaultCameraPosition);
            }
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
